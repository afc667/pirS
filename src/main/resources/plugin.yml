name: Sovereignty
version: '${version}'
main: com.sovereignty.core.SovereigntyPlugin
api-version: '1.20'
description: A hardcore RPG Claim Engine merging Factions, Towny, and Paradox grand strategy.
authors:
  - Sovereignty Team
softdepend:
  - Vault
  - dynmap
  - ItemsAdder
  - Progressions
commands:
  province:
    description: Province management commands
    aliases: [p, prov]
  dip:
    description: Opens the diplomacy GUI
    aliases: [diplomacy]
  war:
    description: Warfare management commands
    aliases: [siege]
  role:
    description: Council role management commands
    aliases: [council]
  caravan:
    description: Trade caravan management commands
    aliases: [trade]
  spy:
    description: Espionage and sabotage commands
    aliases: [espionage]
  skirmish:
    description: Declare a Border Skirmish on a rival province's border chunk
    aliases: [sk]
  mercenary:
    description: Toggle mercenary mode or respond to contract proposals
    usage: /mercenary [on|off|accept|decline]
    aliases: [merc]
  hire:
    description: Hire a mercenary for your province
    usage: /hire <player> <amount> <hours>
