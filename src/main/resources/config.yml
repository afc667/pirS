# ============================================================================
# Sovereignty — Configuration
# A Hardcore RPG Claim Engine for PaperMC 1.20.1+
# Phase 2: Micro-SMP (10-player) optimized gameplay
# ============================================================================

database:
  # Database type: "mysql" for production, "sqlite" for local testing
  type: "mysql"
  # MySQL settings (used when type is "mysql")
  host: "localhost"
  port: 3306
  name: "sovereignty"
  username: "root"
  password: ""
  # SQLite settings (used when type is "sqlite")
  # File path is relative to the plugin data folder
  file: "sovereignty.db"

# Province Core settings
core:
  default-hp: 100
  max-level: 5
  capital-claim-radius: 1          # 1 = 3x3 chunks

# Claim expansion
claims:
  base-cost: 10.0                  # Base Influence cost per chunk
  distance-scale-factor: 16.0     # Higher = gentler exponential curve
  buffer-zone-chunks: 1           # Min wilderness gap between non-allied provinces

# Stability
stability:
  overextension-per-chunk: 0.5
  high-tax-penalty: 10.0
  civil-war-threshold: 20.0
  civil-war-liberty-spike: 40.0
  # Cultural Pressure toggle — set to false for Micro-SMP environments.
  # When false, the cultural pressure async task does not initialize,
  # saving CPU cycles and preventing passive AFK dominance.
  cultural-pressure: false

# Warfare
warfare:
  preparation-hours: 24
  siege-window-start: "20:00"
  siege-window-end: "22:00"

# Vassal / Tribute — Physical Caravan System
# Invisible automatic tribute has been replaced by physical trade caravans.
# Tribute is withdrawn via Vault, stored in a caravan entity's PDC, and
# physically transported between province cores.
vassalage:
  tribute-rate: 0.10              # 10% of vassal's daily income
  liberty-desire-tribute-halt: 50.0
  liberty-desire-independence: 80.0

# ─── Phase 2: Caravan System (Vault Integration) ─────────────────────────
caravan:
  entity-type: LLAMA               # Entity type for trade caravans
  speed: 0.6                       # Caravan movement speed modifier
  despawn-timeout-minutes: 30      # Max lifetime before auto-despawn
  daily-spawn-tick: "12:00"        # Server time when daily caravans spawn

# ─── Phase 2: NAP Stability Penalty ─────────────────────────────────────
diplomacy:
  nap-break-stability-penalty: 25.0  # Stability penalty for breaking a NAP early

# ─── Phase 2: ItemsAdder Integration ────────────────────────────────────
itemsadder:
  enabled: true
  namespaces:
    core-block: "sovereignty:government_stone"
    siege-cannon: "sovereignty:siege_cannon"
    forged-passport: "sovereignty:forged_passport"
    steel-sword: "sovereignty:steel_sword"

# ─── Phase 2: Progressions / Tech Tree ──────────────────────────────────
progressions:
  enabled: true
  era-advancement:
    feudal-sacrifice:
      # Resources required to sacrifice at the Core to reach Feudal era
      IRON_INGOT: 64
      GOLD_INGOT: 32
      EMERALD: 16
    gunpowder-sacrifice:
      # Resources required for Gunpowder era advancement
      DIAMOND: 32
      NETHERITE_SCRAP: 8
      GUNPOWDER: 64

# ─── Phase 2: Dynmap Integration ────────────────────────────────────────
dynmap:
  enabled: true
  border-opacity: 0.35
  border-weight: 2
  fill-opacity: 0.15

# ─── Phase 2: Espionage / Sabotage ──────────────────────────────────────
espionage:
  sabotage-radius: 5               # Block radius from enemy Core
  sabotage-duration-seconds: 15    # Uninterrupted sneak duration
  sabotage-stability-drain: 15.0   # Flat stability drain on success

# ─── Phase 2.5: Unique Relics System ────────────────────────────────────
# Six unique, irreplaceable Relics that grant game-breaking strategic buffs.
# Identified by their ItemsAdder namespace. Each exists as a single item.
relics:
  enabled: true
  disease-spore:
    namespace: "sovereignty:disease_spore"
    infection-duration-minutes: 10   # Chunk infection duration
  physicist-goggles:
    namespace: "sovereignty:physicist_goggles"
    detection-radius: 30             # Block radius for enemy Glowing
    scan-interval-ticks: 40          # Scan frequency (40 = 2 seconds)
  nichirin-sword:
    namespace: "sovereignty:nichirin_sword"
    core-damage-multiplier: 3        # Siege damage multiplier vs Cores
  demon-ash:
    namespace: "sovereignty:demon_ash"
    silence-duration-minutes: 5      # Alert suppression duration
  poetryland-hoe:
    namespace: "sovereignty:poetryland_hoe"
    crop-multiplier: 3               # Crop drop multiplier
    tax-penalty-reduction: 0.5       # High Tax Stability penalty reduction
  crystal-of-resonance:
    namespace: "sovereignty:crystal_of_resonance"
    core-hp-multiplier: 2            # Core HP multiplier
    influence-multiplier: 3          # Influence generation multiplier

# ─── Phase 2.5: Border Skirmishes ───────────────────────────────────────
# Low-stakes localized aggression on outermost border chunks.
skirmish:
  enabled: true
  warning-phase-minutes: 5           # Global warning before combat
  combat-duration-minutes: 15        # Active PvP / protection bypass window
  cooldown-hours: 24                 # Per-province cooldown between skirmishes

# ─── Phase 2.5: Mercenary Enclave ───────────────────────────────────────
# Solo player integration via hire contracts and temporary citizenship.
mercenary:
  enabled: true
  max-contract-hours: 48             # Maximum contract duration
  proposal-timeout-minutes: 2        # Time for mercenary to accept/decline
